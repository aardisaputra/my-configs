# Use vi-style keybindings in copy mode (e.g. h/j/k/l to move, v to start
# a selection, y to yank), instead of the emacs-style bindings tmux uses
# by default.
setw -g mode-keys vi

# Enable xterm-style function/arrow key sequences so key combos like
# Ctrl/Shift/Alt+arrow are passed through correctly to apps in tmux.
set -g xterm-keys on
